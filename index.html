<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vanessa Pilates - Baixar Aplicativo</title>
    <style>
        /* Estilos Gerais e Fundo Dinâmico (Pilates Mood) */
        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f5f0eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            overflow-x: hidden;
            position: relative;
        }

        /* Círculos animados de "Respiração" ao fundo */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(231, 211, 197, 0.4);
            z-index: 1;
            animation: breathe 8s ease-in-out infinite alternate;
        }

        body::before {
            width: 300px;
            height: 300px;
            top: -50px;
            left: -50px;
        }

        body::after {
            width: 400px;
            height: 400px;
            bottom: -100px;
            right: -100px;
            animation-delay: 4s;
            background: rgba(155, 68, 93, 0.05);
        }

        /* Container Principal com Animação de Entrada e Flutuação */
        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(155, 68, 93, 0.1);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.8);
            text-align: center;
            position: relative;
            z-index: 2;
            
            /* Animações combinadas: entrada + flutuação contínua */
            animation: fadeIn 1.2s ease-out, float 6s ease-in-out infinite alternate;
        }

        /* Cabeçalho Zen */
        .card-header {
            background: linear-gradient(180deg, #e7d3c5 0%, #eddacf 60%, #ffffff 100%);
            padding: 45px 20px 25px 20px;
            position: relative;
        }

        .brand-title {
            font-size: 34px;
            color: #2c2c2c;
            margin: 0;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        /* Ícone de Pilates com leve balanço */
        .brand-logo-icon {
            display: inline-block;
            font-size: 28px;
            vertical-align: middle;
            animation: zenSway 4s ease-in-out infinite alternate;
        }

        .brand-subtitle {
            font-size: 15px;
            color: #666666;
            margin: 8px 0 0 0;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Corpo do Cartão */
        .card-body {
            padding: 20px 40px 40px 40px;
        }

        /* Título de Destaque Animado */
        .headline-sorteada {
            color: #9b445d;
            font-size: 34px;
            line-height: 1.2;
            font-weight: 800;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            animation: pulseText 2s infinite alternate;
        }

        .announcement {
            color: #555555;
            font-size: 17px;
            line-height: 1.6;
            margin: 0 0 35px 0;
        }

        .announcement strong {
            color: #111111;
            display: block;
            font-size: 21px;
            margin-top: 12px;
            font-weight: 700;
        }

        /* Botão Interativo e Pulsante */
        .btn-apk {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 20px 30px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(135deg, #9b445d 0%, #752d41 100%);
            color: #ffffff;
            box-shadow: 0 10px 25px rgba(155, 68, 93, 0.4);
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* Pulso sutil constante no botão para chamar atenção */
            animation: buttonPulse 2s infinite;
        }

        /* Efeito de brilho passando pelo botão */
        .btn-apk::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: rgba(255, 255, 255, 0.24);
            transform: rotate(45deg);
            transition: none;
            animation: sheen 4s infinite linear;
        }

        /* Efeitos de Hover (Passar o mouse/dedo) */
        .btn-apk:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 14px 30px rgba(155, 68, 93, 0.5);
            background: linear-gradient(135deg, #ad4d6a 0%, #8a374c 100%);
        }

        .btn-apk:active {
            transform: translateY(-1px) scale(0.99);
        }

        /* Animação do ícone dentro do botão no Hover */
        .btn-apk:hover .icon-svg {
            animation: bounceIcon 1s infinite;
        }

        .icon-svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        /* Rodapé Clean */
        .card-footer {
            background: linear-gradient(180deg, #ffffff 0%, #fcf9f6 100%);
            padding: 30px 20px;
            border-top: 1px solid #f3ece6;
        }

        .social-links { margin-bottom: 15px; }

        .social-icon {
            display: inline-block;
            margin: 0 10px;
            color: #666666;
            transition: transform 0.3s ease, color 0.3s ease;
        }

        .social-icon:hover {
            color: #9b445d;
            transform: scale(1.2);
        }

        .social-icon svg { width: 22px; height: 22px; fill: currentColor; }

        .copyright { font-size: 11px; color: #888888; margin: 0; letter-spacing: 0.5px; }


        /* ---------------------------------------------
           DEFINIÇÕES DAS ANIMAÇÕES (KEYFRAMES)
        --------------------------------------------- */
        
        /* Entrada suave do cartão */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Flutuação contínua (Efeito Leveza/Pilates) */
        @keyframes float {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        /* Balanço suave do ícone do cabeçalho */
        @keyframes zenSway {
            0% { transform: rotate(-6deg) scale(0.95); }
            100% { transform: rotate(6deg) scale(1.05); }
        }

        /* Pulsação sutil do texto principal */
        @keyframes pulseText {
            0% { transform: scale(1); text-shadow: 0 0 0 rgba(155, 68, 93, 0); }
            100% { transform: scale(1.02); text-shadow: 0 4px 10px rgba(155, 68, 93, 0.15); }
        }

        /* Efeito de respiração das esferas do fundo */
        @keyframes breathe {
            0% { transform: scale(1) translate(0, 0); opacity: 0.4; }
            100% { transform: scale(1.15) translate(20px, 20px); opacity: 0.6; }
        }

        /* Pulsação do Botão */
        @keyframes buttonPulse {
            0% { box-shadow: 0 10px 25px rgba(155, 68, 93, 0.4); }
            50% { box-shadow: 0 10px 30px rgba(155, 68, 93, 0.6); }
            100% { box-shadow: 0 10px 25px rgba(155, 68, 93, 0.4); }
        }

        /* Movimento do ícone de download */
        @keyframes bounceIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }

        /* Linha de brilho reflexivo no botão */
        @keyframes sheen {
            0% { left: -60%; }
            20% { left: 140%; }
            100% { left: 140%; }
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Cabeçalho -->
        <div class="card-header">
            <h1 class="brand-title">Vanessa <span class="brand-logo-icon">🧘‍♀️</span> Pilates</h1>
            <p class="brand-subtitle">Comemore Conosco - 6 Anos!</p>
        </div>

        <!-- Corpo do Sorteio -->
        <div class="card-body">

    </div>

</body>
</html>
