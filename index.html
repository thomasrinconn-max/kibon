<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulte seu Cashback</title>
    <style>
        :root {
            --primary: #25d366;
            --secondary: #128c7e;
            --dark: #1e293b;
            --light: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 450px; width: 100%; }
        h2 { color: var(--dark); margin-bottom: 10px; font-size: 24px; text-align: center; }
        p { color: #64748b; font-size: 14px; text-align: center; margin-bottom: 25px; line-height: 1.5; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: var(--dark); font-weight: 600; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; transition: all 0.3s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2); }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        button:hover { background: var(--secondary); }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="container">
    <h2>Consulte seu Cashback! 💰</h2>
    <p>Preencha os dados abaixo para realizarmos a análise da sua máquina e liberar seu resgate.</p>
    
    <form id="cashbackForm">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" placeholder="Digite seu nome" required>
        </div>
        
        <div class="form-group">
            <label for="documento">CPF ou CNPJ</label>
            <input type="text" id="documento" placeholder="000.000.000-00" required>
        </div>
        
        <div class="form-group">
            <label for="telefone">Telefone / WhatsApp</label>
            <input type="tel" id="telefone" placeholder="(00) 90000-0000" required>
        </div>
        
        <div class="form-group">
            <label for="renda">Faturamento Mensal da Máquina</label>
            <input type="text" id="renda" placeholder="R$ 0,00" required>
        </div>
        
        <button type="submit">Enviar para Análise</button>
    </form>
    
    <div class="footer">🔒 Seus dados estão seguros e protegidos.</div>
</div>
